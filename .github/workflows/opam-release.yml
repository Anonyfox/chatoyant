# Submit a release to the public opam-repository — CI twin of `make opam-publish`.
#
# Runs scripts/opam-publish.mjs, which builds + tests the source tarball
# (dune-release distrib), uploads it to the GitHub release, verifies the served
# checksum, writes the opam recipe, and opens (or force-updates) the PR against
# ocaml/opam-repository from your fork. Re-running with the same tag updates
# the open PR, so this is also how review feedback gets addressed from CI.
#
# Requires the OPAM_PUBLISH_TOKEN secret: a classic PAT with repo scope, used
# by gh for the release asset upload, the fork, and the pull request.

name: Submit to opam-repository

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to submit (e.g. v0.12.0)"
        required: true

permissions:
  contents: read

jobs:
  opam-submit:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.OPAM_PUBLISH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies and dune-release
        run: |
          opam install . --deps-only --with-test -y
          opam install dune-release -y

      - name: Configure git identity and credentials
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          gh auth setup-git

      - name: Publish to opam-repository
        run: opam exec -- node scripts/opam-publish.mjs --tag "${{ inputs.tag }}"
