# Continuous integration: native OCaml build + tests, the Melange-generated npm
# bundle, TypeScript declaration checks, the official JSON Schema suite, opam
# metadata + doc-link lint, and formatting. Mirrors `npm run release:check`
# locally, across a small matrix of OCaml compilers.

name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ocaml ${{ matrix.ocaml }} · node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ocaml: ["5.3.x", "5.4.x"]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml ${{ matrix.ocaml }}
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml }}
          dune-cache: true

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --with-doc -y

      - name: Install ocamlformat
        run: opam install ocamlformat.0.29.0 -y

      - name: Install Node dependencies
        run: npm ci

      - name: Check formatting
        run: opam exec -- dune build @fmt

      - name: Build, test, and bundle
        run: opam exec -- npm test

      - name: Lint opam metadata and doc links
        run: opam exec -- npm run lint

      - name: Build odoc documentation
        run: opam exec -- dune build @doc
