# Build the odoc API documentation and deploy it to GitHub Pages on every push
# to main. Replaces the former TypeDoc site. Enable in repo settings:
# Settings -> Pages -> Source: GitHub Actions.

name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies and odoc
        run: opam install . --deps-only --with-doc -y && opam install odoc -y

      - name: Build odoc documentation
        run: opam exec -- dune build @doc

      - name: Apply Chatoyant branding
        run: node scripts/brand-docs.mjs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
