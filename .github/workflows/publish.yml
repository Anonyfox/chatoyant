# Publish the npm package on a version tag.
#
#   1. Bump locally with `make release-{patch,minor,major}` (keeps package.json,
#      dune-project, chatoyant.opam, and the tag in lockstep).
#   2. Push the tag: `git push --follow-tags`.
#
# Publishing uses npm provenance via an OIDC trusted publisher — no NPM_TOKEN
# secret required. Configure the trusted publisher once at npmjs.com.
# The opam-repository submission is a separate, deliberate step: see
# opam-release.yml.

name: Publish npm package

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.12.2) — runs this (main) workflow definition against that tag"
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          package-manager-cache: false

      # Pinned to the v11 line: npm 12.0.0 (2026-07-08) ships a broken
      # sigstore dependency that crashes `npm publish --provenance` with
      # MODULE_NOT_FOUND. Bump deliberately once v12 is fixed.
      - name: Install npm 11 (provenance support)
        run: |
          npm install --global --prefix "$RUNNER_TEMP/npm-latest" npm@11
          echo "$RUNNER_TEMP/npm-latest/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test -y
          npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG="${TAG#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag does not match package.json version $PKG"
            exit 1
          fi

      - name: Build, test, and bundle
        run: opam exec -- npm test

      - name: Publish to npm
        run: opam exec -- npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
