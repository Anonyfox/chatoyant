# Publish the npm package on a version tag.
#
#   1. Bump locally with `make release-{patch,minor,major}` (keeps package.json,
#      dune-project, chatoyant.opam, and the tag in lockstep).
#   2. Push the tag: `git push --follow-tags`.
#
# Publishing uses npm provenance via an OIDC trusted publisher — no NPM_TOKEN
# secret required. Configure the trusted publisher once at npmjs.com.
# The opam-repository submission is a separate, deliberate step: see
# opam-release.yml.

name: Publish npm package

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.3.x"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install latest npm (provenance support)
        run: |
          npm install --global --prefix "$RUNNER_TEMP/npm-latest" npm@latest
          echo "$RUNNER_TEMP/npm-latest/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          opam install . --deps-only --with-test -y
          npm ci

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi

      - name: Build, test, and bundle
        run: opam exec -- npm test

      - name: Publish to npm
        run: opam exec -- npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
